<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A&amp;T Racer — Sign In</title>
<style>
/* === A&T RACER SHARED CSS === */
:root[data-theme="dark"]{
  --bg:#0c0c10;--bg2:#13131a;--bg3:#1a1a24;--bg4:#22222e;--bg5:#2a2a38;
  --border:#2a2a3a;--border2:#363648;
  --text:#eeeef5;--text2:#8888a8;--text3:#55556a;
  --accent:#e8392a;--accent2:#ff5544;--accentbg:rgba(232,57,42,0.12);--accentbdr:rgba(232,57,42,0.3);
  --green:#2ecf72;--greenbg:rgba(46,207,114,0.1);--greenbdr:rgba(46,207,114,0.3);
  --amber:#f0a030;--amberbg:rgba(240,160,48,0.1);--amberbdr:rgba(240,160,48,0.3);
  --blue:#4a8fff;--bluebg:rgba(74,143,255,0.1);--bluebdr:rgba(74,143,255,0.25);
  --purple:#a060ff;--purplebg:rgba(160,96,255,0.1);--purplebdr:rgba(160,96,255,0.25);
  --shadow:0 2px 16px rgba(0,0,0,0.5);--shadow2:0 1px 4px rgba(0,0,0,0.35);
  --r:10px;--nav-h:56px;
}
:root[data-theme="light"]{
  --bg:#f0f0ee;--bg2:#ffffff;--bg3:#f7f7f5;--bg4:#ededea;--bg5:#e2e2de;
  --border:#ddddd8;--border2:#c8c8c4;
  --text:#111118;--text2:#66667a;--text3:#aaaabc;
  --accent:#d42e20;--accent2:#e84433;--accentbg:rgba(212,46,32,0.08);--accentbdr:rgba(212,46,32,0.25);
  --green:#1a8a48;--greenbg:rgba(26,138,72,0.1);--greenbdr:rgba(26,138,72,0.3);
  --amber:#c07800;--amberbg:rgba(192,120,0,0.1);--amberbdr:rgba(192,120,0,0.3);
  --blue:#2a6ed4;--bluebg:rgba(42,110,212,0.1);--bluebdr:rgba(42,110,212,0.25);
  --purple:#7040cc;--purplebg:rgba(112,64,204,0.1);--purplebdr:rgba(112,64,204,0.25);
  --shadow:0 2px 12px rgba(0,0,0,0.08);--shadow2:0 1px 3px rgba(0,0,0,0.06);
  --r:10px;--nav-h:56px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh;transition:background 0.2s,color 0.2s}
.nav{position:fixed;top:0;left:0;right:0;z-index:100;height:var(--nav-h);background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;box-shadow:var(--shadow2)}
.nav-logo{font-size:18px;font-weight:800;letter-spacing:-0.04em;font-style:italic;margin-right:28px;white-space:nowrap;cursor:pointer;text-decoration:none;color:var(--text)}
.nav-logo .amp{color:var(--accent)}
.nav-tabs{display:flex;align-items:center;gap:2px;flex:1;overflow-x:auto}
.nav-tab{padding:6px 13px;border-radius:6px;font-size:13px;color:var(--text2);cursor:pointer;border:none;background:none;transition:all 0.15s;white-space:nowrap;font-family:inherit;text-decoration:none;display:inline-flex;align-items:center;gap:5px}
.nav-tab:hover{color:var(--text);background:var(--bg4)}
.nav-tab.active{color:var(--accent);background:var(--accentbg);font-weight:500}
.tab-badge{background:var(--accent);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:8px;line-height:1.4;margin-left:2px}
.nav-right{display:flex;align-items:center;gap:8px;margin-left:auto;padding-left:12px}
.icon-btn{width:34px;height:34px;border-radius:50%;border:1px solid var(--border2);background:var(--bg3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--text2);transition:all 0.15s;text-decoration:none;position:relative}
.icon-btn:hover{background:var(--bg5);color:var(--text)}
.notif-dot{position:absolute;top:5px;right:5px;width:7px;height:7px;border-radius:50%;background:var(--accent);border:1.5px solid var(--bg2)}
.avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#ff8844);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;cursor:pointer;border:2px solid var(--bg2);box-shadow:0 0 0 1px var(--accent);text-decoration:none}
.page{max-width:1100px;margin:0 auto;padding:calc(var(--nav-h) + 24px) 20px 60px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:18px;box-shadow:var(--shadow2);margin-bottom:14px}
.card-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:14px}
.divider{border:none;border-top:1px solid var(--border);margin:14px 0}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:500}
.badge-live{background:var(--greenbg);color:var(--green);border:1px solid var(--greenbdr)}
.badge-next{background:var(--accentbg);color:var(--accent);border:1px solid var(--accentbdr)}
.badge-done{background:var(--bg4);color:var(--text3);border:1px solid var(--border)}
.badge-sched{background:var(--bluebg);color:var(--blue);border:1px solid var(--bluebdr)}
.badge-classic{background:var(--amberbg);color:var(--amber);border:1px solid var(--amberbdr)}
.badge-fast{background:var(--purplebg);color:var(--purple);border:1px solid var(--purplebdr)}
.badge-open{background:var(--greenbg);color:var(--green);border:1px solid var(--greenbdr)}
.badge-locked{background:var(--bg4);color:var(--text3);border:1px solid var(--border)}
.badge-countdown{background:var(--accentbg);color:var(--accent);border:1px solid var(--accentbdr)}
.btn{padding:7px 14px;border-radius:6px;border:1px solid var(--border2);background:var(--bg3);font-size:12px;cursor:pointer;color:var(--text);font-family:inherit;transition:all 0.15s;white-space:nowrap;display:inline-flex;align-items:center;gap:6px;text-decoration:none}
.btn:hover{background:var(--bg5)}
.btn-accent{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-accent:hover{background:var(--accent2)}
.btn-full{width:100%;justify-content:center}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-disabled{opacity:0.4;pointer-events:none}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;display:inline-block}
.pulse{animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.35}}
.perf-bar-wrap{background:var(--bg4);border-radius:3px;height:5px;overflow:hidden;margin-top:3px}
.perf-bar{height:100%;border-radius:3px;transition:width 0.4s}
.standings-table{width:100%;border-collapse:collapse;font-size:13px}
.standings-table th{text-align:left;padding:7px 8px;font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:var(--text3);border-bottom:1px solid var(--border);font-weight:600}
.standings-table td{padding:8px 8px;border-bottom:1px solid var(--border);vertical-align:middle}
.standings-table tr:last-child td{border-bottom:none}
.standings-table tr.you-row td{background:var(--accentbg)}
.car-chip{display:inline-flex;align-items:center;justify-content:center;width:28px;height:16px;border-radius:3px;font-size:9px;font-weight:700;color:#fff}
.empty-state{text-align:center;padding:48px 24px;color:var(--text3)}
.empty-state .icon{font-size:40px;margin-bottom:12px;opacity:0.5}
.empty-state h3{font-size:15px;color:var(--text2);margin-bottom:6px}
.empty-state p{font-size:13px}
.section-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin:20px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
body.mobile-view .home-grid,body.mobile-view .detail-grid,body.mobile-view .stats-row{grid-template-columns:1fr!important}
body.mobile-view .session-strip{grid-template-columns:1fr 1fr!important}
body.mobile-view .seat-section{flex-direction:row!important;align-items:center!important;border-left:none!important;border-top:1px solid var(--border)!important;min-width:unset!important}
body.mobile-view .season-row{flex-direction:column!important}
body.mobile-view .car-image-panel{width:80px!important}
body.mobile-view .nav-tabs{display:none!important}
body.mobile-view .nav-logo{margin-right:auto!important}
body.mobile-view .page{padding-left:14px!important;padding-right:14px!important}
</style>
<script>
/* Login page — theme only, no nav, no session redirect */
(function(){
  var t = localStorage.getItem("atracer_theme") || "light";
  document.documentElement.setAttribute("data-theme", t);
})();
function toggleTheme(){
  var html = document.documentElement;
  var dark = html.getAttribute("data-theme") === "dark";
  var next = dark ? "light" : "dark";
  html.setAttribute("data-theme", next);
  localStorage.setItem("atracer_theme", next);
  var btn = document.getElementById("themeBtn");
  if(btn) btn.textContent = next === "dark" ? "☀️" : "🌙";
}
</script>
<style>
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh;display:flex;flex-direction:column;transition:background 0.2s,color 0.2s}
.topbar{position:fixed;top:0;left:0;right:0;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:52px;background:transparent}
.logo-text{font-size:20px;font-weight:800;letter-spacing:-0.04em;font-style:italic;color:var(--text)}
.logo-text .amp{color:var(--accent)}
.theme-btn{width:32px;height:32px;border-radius:50%;border:1px solid var(--border2);background:var(--bg2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--text2);transition:all 0.15s}
.theme-btn:hover{background:var(--bg4);color:var(--text)}
.bg-art{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.bg-art svg{width:100%;height:100%;opacity:0.04}
.wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:72px 20px 24px;position:relative;z-index:1}
.login-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:40px 36px;width:100%;max-width:380px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.login-card::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),#ff8844,#f0a030)}
.logo-block{text-align:center;margin-bottom:28px}
.logo-mark{display:inline-flex;align-items:center;justify-content:center;width:60px;height:60px;border-radius:14px;background:linear-gradient(135deg,var(--accent),#ff6600);margin-bottom:10px;box-shadow:0 4px 16px rgba(232,57,42,0.3)}
.logo-mark svg{width:34px;height:34px;fill:#fff}
.logo-block h1{font-size:22px;font-weight:800;letter-spacing:-0.04em;font-style:italic}
.logo-block h1 .amp{color:var(--accent)}
.logo-block p{font-size:11px;color:var(--text3);margin-top:3px;text-transform:uppercase;letter-spacing:0.06em}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.05em}
.field input{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:8px;font-size:15px;background:var(--bg3);color:var(--text);font-family:inherit;transition:border-color 0.15s;min-height:48px}
.field input:focus{outline:none;border-color:var(--accent)}
.field input::placeholder{color:var(--text3)}
.error{background:var(--accentbg);border:1px solid var(--accentbdr);border-radius:8px;padding:10px 12px;font-size:13px;color:var(--accent);margin-bottom:14px;display:none;text-align:center}
.error.show{display:block}
.submit-btn{width:100%;padding:13px;border:none;border-radius:8px;background:var(--accent);color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.15s;margin-top:4px}
.submit-btn:hover{background:var(--accent2);transform:translateY(-1px);box-shadow:0 4px 12px rgba(232,57,42,0.3)}
.beta-note{text-align:center;font-size:11px;color:var(--text3);margin-top:18px;padding-top:16px;border-top:1px solid var(--border)}
.beta-note strong{color:var(--text2)}
.footer{position:relative;z-index:1;text-align:center;padding:14px;font-size:11px;color:var(--text3)}
.loading{position:fixed;inset:0;z-index:100;background:var(--bg);display:none;align-items:center;justify-content:center;flex-direction:column;gap:14px}
.loading.show{display:flex}
.loading-logo{font-size:26px;font-weight:800;letter-spacing:-0.04em;font-style:italic}
.loading-logo .amp{color:var(--accent)}
.loading-bar-wrap{width:180px;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.loading-bar{height:100%;background:linear-gradient(90deg,var(--accent),#ff8844);border-radius:2px;width:0;transition:width 0.04s}
.loading-msg{font-size:12px;color:var(--text3)}
@media(max-width:480px){.login-card{padding:28px 20px;border-radius:14px}.wrap{padding:64px 14px 20px}}
</style>
</head>
<body>

<div class="bg-art">
  <svg viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice">
    <path d="M80 720 Q180 620 320 640 Q480 670 520 510 Q560 350 720 295 Q870 245 920 140 Q960 70 1120 90" stroke="currentColor" stroke-width="44" fill="none" stroke-linecap="round"/>
    <path d="M80 720 Q180 600 320 620 Q480 650 520 490 Q560 330 720 275 Q870 225 920 120 Q960 50 1120 70" stroke="currentColor" stroke-width="3" fill="none" stroke-dasharray="18 12" opacity="0.4"/>
    <circle cx="320" cy="630" r="5" fill="currentColor" opacity="0.5"/>
    <circle cx="520" cy="500" r="5" fill="currentColor" opacity="0.5"/>
    <circle cx="720" cy="285" r="5" fill="currentColor" opacity="0.5"/>
    <circle cx="920" cy="130" r="5" fill="currentColor" opacity="0.5"/>
  </svg>
</div>

<div class="topbar">
  <div class="logo-text">A<span class="amp">&amp;</span>T Racer</div>
  <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">🌙</button>
</div>

<div class="wrap">
  <div class="login-card">
    <div class="logo-block">
      <div class="logo-mark">
        <svg viewBox="0 0 34 34"><circle cx="17" cy="17" r="15" stroke="#fff" stroke-width="2.5" fill="none"/><circle cx="17" cy="17" r="5" fill="#fff"/><line x1="17" y1="2" x2="17" y2="9" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/><line x1="17" y1="25" x2="17" y2="32" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/><line x1="2" y1="17" x2="9" y2="17" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/><line x1="25" y1="17" x2="32" y2="17" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/></svg>
      </div>
      <h1>A<span class="amp">&amp;</span>T Racer</h1>
      <p>Beta Access</p>
    </div>
    <div class="error" id="errMsg">Incorrect username or password</div>
    <div class="field">
      <label>Username</label>
      <input type="text" id="uname" placeholder="Enter username" autocomplete="username" onkeydown="if(event.key==='Enter')document.getElementById('pw').focus()">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="pw" placeholder="Enter password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="submit-btn" onclick="doLogin()">Sign in →</button>
    <div class="beta-note"><strong>Beta build</strong> — contact the team for access</div>
  </div>
</div>

<div class="footer">A&amp;T Racer © 2026 · Beta v0.1</div>

<div class="loading" id="loading">
  <div class="loading-logo">A<span class="amp">&amp;</span>T Racer</div>
  <div class="loading-bar-wrap"><div class="loading-bar" id="loadBar"></div></div>
  <div class="loading-msg" id="loadMsg">Starting engine...</div>
</div>

<script>
var ACCOUNTS = [
  {username:"User1",password:"Pass1",name:"Ashley Eyre",   nationality:"Moldovan",     flag:"🇲🇩",initials:"AE"},
  {username:"User2",password:"Pass2",name:"Thomas Eyre",   nationality:"British",      flag:"🇬🇧",initials:"TE"},
  {username:"User3",password:"Pass3",name:"Kieren Winter", nationality:"San Marinese", flag:"🇸🇲",initials:"KW"},
  {username:"User4",password:"Pass4",name:"Elliot Orme",   nationality:"British",      flag:"🇬🇧",initials:"EO"},
  {username:"User5",password:"Pass5",name:"Craig Charles", nationality:"British",      flag:"🇬🇧",initials:"CC"},
];
var MSGS = ["Starting engine...","Loading carset data...","Preparing the grid...","Checking tyre allocations...","Ready to race..."];
function doLogin(){
  var u = document.getElementById("uname").value.trim();
  var p = document.getElementById("pw").value;
  var acct = null;
  for(var i=0;i<ACCOUNTS.length;i++){
    if(ACCOUNTS[i].username.toLowerCase()===u.toLowerCase() && ACCOUNTS[i].password===p){
      acct=ACCOUNTS[i]; break;
    }
  }
  if(!acct){
    document.getElementById("errMsg").classList.add("show");
    document.getElementById("pw").value="";
    document.getElementById("pw").focus();
    return;
  }
  document.getElementById("errMsg").classList.remove("show");
  sessionStorage.setItem("atracer_user", JSON.stringify(acct));
  var ov=document.getElementById("loading");
  var bar=document.getElementById("loadBar");
  var msg=document.getElementById("loadMsg");
  ov.classList.add("show");
  var pct=0, mi=0;
  var iv=setInterval(function(){
    pct+=2; bar.style.width=pct+"%";
    if(pct%20===0 && mi<MSGS.length-1){ mi++; msg.textContent=MSGS[mi]; }
    if(pct>=100){
      clearInterval(iv);
      msg.textContent="Welcome, "+acct.name+"!";
      setTimeout(function(){ window.location.href="atracer-home.html"; },500);
    }
  },28);
}
document.getElementById("uname").focus();
</script>
</body>
</html>
